name: nova_assistive
description: NOVA - Navigational Object and Voice Assistant mobile section.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management (LOCKED CONSISTENT VERSION SET)
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Vision / Camera / ML
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.15.0
  tflite_flutter: ^0.11.0
  image: ^3.3.0

  # Speech
  flutter_tts: ^4.2.3
  speech_to_text: ^7.4.0
  audio_session: ^0.2.1

  # Networking
  dio: ^5.9.0
  connectivity_plus: ^6.1.5

  # Database
  drift: ^2.28.1
  sqlite3_flutter_libs: ^0.5.39
  path_provider: ^2.1.5
  path: ^1.9.1

  # Storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.3.1

  # Location / Permissions
  geolocator: ^13.0.4
  permission_handler: ^12.0.1
  vibration: ^3.1.3

  # Utilities
  dartz: ^0.10.1
  rxdart: ^0.28.0
  logger: ^2.6.1
  uuid: ^4.5.1
  intl: ^0.20.2
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.5.4
  drift_dev: ^2.28.1
  injectable_generator: ^2.7.0

  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/labels/