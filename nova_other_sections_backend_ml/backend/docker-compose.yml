services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova_password
      POSTGRES_DB: nova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      NOVA_DATABASE_URL: postgresql+psycopg://nova:nova_password@postgres:5432/nova
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./model_store:/app/model_store

volumes:
  postgres_data:
